name: My First CI Workflow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:                          # Job 1
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run app
        run: node index.js

  build:                         # Job 2
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build complete message
        run: echo "Build successful! Test passed."

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy message
        run: echo "Deploying to production..."

  show-info:
    runs-on: ubuntu-latest
    env:
      APP_VERSION: '1.0.0'
    steps:
      - name: App info 
        run: |
          echo "App: $APP_NAME"
          echo "Version: $APP_VERSION"
          echo "Branch: ${{ github.ref_name }}"
          echo "Who triggered: ${{ github.actor }}"
          echo "Event type: ${{ github.event_name }}"