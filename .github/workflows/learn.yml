name:  My First CI Workflow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Code attached
      - uses: actions/checkout@v4


      - name: node.js  setup
      - uses: actions/setup-node@v4
        with:
          node-version: '20'


      - name: Dependency Install
        run: npm install


      - name: App run
        run: node index.js
